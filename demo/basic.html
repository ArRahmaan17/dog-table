<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Table - Basic Demo</title>
    <link rel="stylesheet" href="../src/data-table.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px 20px;
        background:
          radial-gradient(circle at top left, rgba(45, 125, 154, 0.18), transparent 35%),
          linear-gradient(135deg, #f4f7fb, #e6ecf3);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1;
        color: #102a43;
      }

      p {
        margin-bottom: 24px;
        color: #486581;
      }

      .nav {
        display: inline-flex;
        margin-bottom: 20px;
        color: #0f766e;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="nav" href="./index.html">Back to gallery</a>
      <h1>Basic Local Table</h1>
      <p>Vanilla JavaScript data table with sorting, search, pagination, render callbacks, and lifecycle hooks.</p>
      <div id="app"></div>
    </main>

    <script type="module">
      import { DataTable } from "../src/data-table.js";

      const data = [
        { name: "Mochi", breed: "Shiba Inu", age: 3, adopted: "2024-01-12" },
        { name: "Pepper", breed: "Beagle", age: 5, adopted: "2023-11-04" },
        { name: "Nori", breed: "Corgi", age: 2, adopted: "2024-03-21" },
        { name: "Biscuit", breed: "Golden Retriever", age: 6, adopted: "2022-09-30" },
        { name: "Suki", breed: "Pomeranian", age: 4, adopted: "2024-02-18" },
        { name: "Atlas", breed: "German Shepherd", age: 7, adopted: "2021-08-08" },
        { name: "Olive", breed: "Mixed", age: 1, adopted: "2024-04-01" },
      ];

      const table = new DataTable("#app", {
        data,
        pageSize: 3,
        searchDebounce: 200,
        searchPlaceholder: "Search dogs by name, breed, or adoption date",
        emptyStateText: "No dogs have been added yet.",
        noResultsText: "No dogs match your search.",
        initialSort: {
          key: "name",
          direction: "asc",
        },
        columns: [
          { key: "name", label: "Name" },
          {
            key: "breed",
            label: "Breed",
            sortable: false,
          },
          { key: "age", label: "Age" },
          {
            key: "adopted",
            label: "Adopted",
            sortValue(value) {
              return new Date(value).getTime();
            },
            render(value) {
              return new Date(value).toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "numeric",
              });
            },
          },
        ],
      });

      table.init();
    </script>
  </body>
</html>
