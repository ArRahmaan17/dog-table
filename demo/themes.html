<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Table - Theme Demo</title>
    <link rel="stylesheet" href="../src/data-table.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px 20px;
        background: linear-gradient(180deg, #f9fafb, #eef2ff);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      .nav {
        display: inline-flex;
        margin-bottom: 20px;
        color: #4338ca;
        font-weight: 600;
      }

      h1 {
        margin: 0 0 12px;
        color: #312e81;
      }

      p {
        margin: 0 0 20px;
        color: #6366f1;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .controls button {
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        background: #c7d2fe;
        color: #312e81;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .controls button:hover {
        background: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="nav" href="./index.html">Back to gallery</a>
      <h1>Theme Presets</h1>
      <p>
        Switch the active class mapping to preview the `default`, `bootstrap`,
        and `tailwind` presets.
      </p>

      <div class="controls">
        <button type="button" data-theme="default">Default</button>
        <button type="button" data-theme="bootstrap">Bootstrap</button>
        <button type="button" data-theme="tailwind">Tailwind</button>
      </div>

      <div id="app"></div>
    </main>

    <script type="module">
      import { DataTable } from "../src/data-table.js";

      const dogs = [
        { name: "Mochi", size: "Small", energy: "Medium", fee: 120 },
        { name: "Pepper", size: "Medium", energy: "High", fee: 180 },
        { name: "Atlas", size: "Large", energy: "High", fee: 220 },
        { name: "Olive", size: "Small", energy: "Low", fee: 90 },
      ];

      const table = new DataTable("#app", {
        data: dogs,
        pageSize: 4,
        theme: "default",
        columns: [
          { key: "name", label: "Name" },
          { key: "size", label: "Size" },
          { key: "energy", label: "Energy" },
          {
            key: "fee",
            label: "Adoption Fee",
            render(value) {
              return new Intl.NumberFormat("en-US", {
                style: "currency",
                currency: "USD",
              }).format(value);
            },
          },
        ],
      });

      table.init();

      document.querySelector(".controls").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-theme]");
        if (!button) {
          return;
        }

        table.setTheme(button.dataset.theme);
      });
    </script>
  </body>
</html>
